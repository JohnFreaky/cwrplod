<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <script type="text/javascript">
      document.write(
        '<link rel="stylesheet" href="css/main.css?' + Math.random() + '">'
      );
    </script>
    <link
      href="https://fonts.googleapis.com/css?family=Ubuntu|Ubuntu+Condensed|Ubuntu+Mono&display=swap"
      rel="stylesheet"
    />
    <!-- <link rel="stylesheet" href="css/main.css" /> -->
    <title>Loading Screen | By Exsite</title>
  </head>
  <body>
    <div class="background-wrapper">
      <div class="background background-a"></div>
      <div class="background background-b"></div>
    </div>
    <div class="overhaul"></div>
    <div id="particles"></div>
    <div class="loading-bar">
      <div class="loading-bar-fill">
        <div class="loading-bar-shimmer"></div>
      </div>
    </div>
    <div id="loading-stats"></div>

    <nav>
      <div id="announcement"></div>
      <span id="map">You're playing on </span>
      <span id="steamid"></span>
    </nav>

    <div id="debug"></div>

    <main>
      <div class="pda-panel">
        <div class="pda-header">
          <div class="pda-corner pda-corner-tl"></div>
          <div class="pda-corner pda-corner-tr"></div>
          <span class="pda-label">GAR FIELD UNIT</span>
          <h1 id="title"></h1>
        </div>
        <div class="pda-body">
          <div class="pda-scanline"></div>
          <div id="history"></div>
          <div class="pda-cursor">_</div>
        </div>
      </div>
      <div class="under-nav"></div>
    </main>
    <audio id="ambient-music" loop preload="auto"></audio>

    <script src="js/lib/jquery-3.4.1.min.js"></script>
    <script type="text/javascript">
      document.write(
        '<script src="js/config.js?' + Math.random() + '"><\/script>'
      );
      document.write(
        '<script src="js/main.js?' + Math.random() + '"><\/script>'
      );
    </script>
    <!-- <script src="config.js"></script> -->
    <!-- <script src="js/main.js"></script> -->
  </body>
</html>
